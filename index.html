<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Tag Studios</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0b0b0f;
    color:white;
}

header{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:rgba(15,15,25,.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #222;
    z-index:1000;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#4da3ff;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:30px;
    transition:.3s;
}

nav a:hover{
    color:#4da3ff;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:120px 20px 60px;
    background:
    radial-gradient(circle at top,#2b5cff33,transparent 60%),
    #0b0b0f;
}

.hero h1{
    font-size:65px;
    margin-bottom:20px;
}

.hero p{
    max-width:700px;
    font-size:22px;
    color:#bbbbbb;
    line-height:1.6;
}

.buttons{
    margin-top:40px;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:15px 35px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.primary{
    background:#4da3ff;
    color:white;
}

.primary:hover{
    background:#6ab5ff;
}

.secondary{
    border:2px solid #4da3ff;
    color:#4da3ff;
}

.secondary:hover{
    background:#4da3ff;
    color:white;
}

.section{
    padding:90px 8%;
}

.section h2{
    text-align:center;
    font-size:42px;
    margin-bottom:50px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
}

.card{
    background:#16161d;
    border:1px solid #2a2a38;
    padding:35px;
    border-radius:15px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    border-color:#4da3ff;
}

.card h3{
    color:#4da3ff;
    margin-bottom:15px;
}

footer{
    text-align:center;
    padding:40px;
    color:#888;
    border-top:1px solid #222;
    background:#101016;
}

</style>

</head>
<body>

<header>

<div class="logo">Zero Tag Studios</div>

<nav>
<a href="index.html">Home</a>
<a href="download.html">Download</a>
<a href="contact.html">Contact</a>
<a href="socials.html">Socials</a>
</nav>

</header>

<section class="hero">

<h1>Zero Tag Studios</h1>

<p>
Welcome to Zero Tag Studios.
</p>

<div class="buttons">
<a class="btn primary" href="download.html">Download</a>
<a class="btn secondary" href="socials.html">Join Our Community</a>
</div>

</section>

<footer>

<p>© 2026 Zero Tag Studios. All Rights Reserved.</p>

</footer>

</body>
</html>
